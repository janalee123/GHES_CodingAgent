name: Copilot Test Generator (Master)

on:
  workflow_call:
    inputs:
      trigger_type:
        required: true
        type: string
        description: 'pull_request or issue'
      pr_number:
        required: false
        type: string
        default: ''
      issue_number:
        required: false
        type: string
        default: ''

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
  NODE_TLS_REJECT_UNAUTHORIZED: '0'

jobs:
  generate-tests:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get context from PR
        if: inputs.trigger_type == 'pull_request'
        id: pr_context
        run: |
          PR_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          # Use heredoc for title to handle special characters
          echo "title<<EOFTITLE" >> $GITHUB_OUTPUT
          echo "$PR_DATA" | jq -r '.title' >> $GITHUB_OUTPUT
          echo "EOFTITLE" >> $GITHUB_OUTPUT
          echo "body=$(echo "$PR_DATA" | jq -r '.body // empty')" >> $GITHUB_OUTPUT
          echo "head_branch=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "base_branch=$(echo "$PR_DATA" | jq -r '.base.ref')" >> $GITHUB_OUTPUT
          
          # Get changed files
          FILES=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/files")
          
          # Filter to source files (exclude test files, configs, etc.)
          SOURCE_FILES=$(echo "$FILES" | jq -r '[.[] | select(.filename | test("\\.(js|ts|py|java|go|cs|rb|php|rs|swift|kt)$")) | select(.filename | test("test|spec|__test__|_test\\.|tests/") | not)] | .[].filename' | head -20)
          
          echo "source_files<<EOF" >> $GITHUB_OUTPUT
          echo "$SOURCE_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Get the diff
          DIFF=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          echo "$DIFF" > /tmp/pr_diff.txt

      - name: Get context from Issue
        if: inputs.trigger_type == 'issue'
        id: issue_context
        run: |
          ISSUE_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.issue_number }}")
          
          echo "title<<EOFTITLE" >> $GITHUB_OUTPUT
          echo "$ISSUE_DATA" | jq -r '.title' >> $GITHUB_OUTPUT
          echo "EOFTITLE" >> $GITHUB_OUTPUT
          echo "body=$(echo "$ISSUE_DATA" | jq -r '.body // empty')" >> $GITHUB_OUTPUT
          
          # Parse file paths from issue body (expecting format like "Files: path/to/file.js, another/file.py")
          BODY=$(echo "$ISSUE_DATA" | jq -r '.body // empty')
          FILES=$(echo "$BODY" | grep -oP '(?<=Files?:\s*)[^\n]+' | tr ',' '\n' | tr -d ' ' | head -20)
          
          if [ -z "$FILES" ]; then
            # If no files specified, use recent commits
            FILES=$(git diff --name-only HEAD~5 HEAD -- '*.js' '*.ts' '*.py' '*.java' '*.go' '*.cs' | grep -v -E 'test|spec|__test__' | head -20)
          fi
          
          echo "source_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Create empty diff file
          echo "" > /tmp/pr_diff.txt

      - name: Detect project configuration
        id: detect
        run: |
          # Detect test framework
          if [ -f "package.json" ]; then
            LANG="javascript"
            if grep -q '"jest"' package.json; then
              FRAMEWORK="jest"
            elif grep -q '"mocha"' package.json; then
              FRAMEWORK="mocha"
            elif grep -q '"vitest"' package.json; then
              FRAMEWORK="vitest"
            else
              FRAMEWORK="jest"
            fi
            TEST_DIR="__tests__"
            TEST_SUFFIX=".test.js"
          elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
            LANG="python"
            if grep -q 'pytest' requirements.txt 2>/dev/null || grep -q 'pytest' pyproject.toml 2>/dev/null; then
              FRAMEWORK="pytest"
            else
              FRAMEWORK="unittest"
            fi
            TEST_DIR="tests"
            TEST_SUFFIX="_test.py"
          elif [ -f "go.mod" ]; then
            LANG="go"
            FRAMEWORK="testing"
            TEST_DIR=""
            TEST_SUFFIX="_test.go"
          elif [ -f "pom.xml" ] || [ -f "build.gradle" ]; then
            LANG="java"
            FRAMEWORK="junit"
            TEST_DIR="src/test/java"
            TEST_SUFFIX="Test.java"
          elif [ -f "*.csproj" ] || [ -f "*.sln" ]; then
            LANG="csharp"
            FRAMEWORK="xunit"
            TEST_DIR="Tests"
            TEST_SUFFIX="Tests.cs"
          else
            LANG="unknown"
            FRAMEWORK="generic"
            TEST_DIR="tests"
            TEST_SUFFIX="_test"
          fi
          
          echo "language=$LANG" >> $GITHUB_OUTPUT
          echo "framework=$FRAMEWORK" >> $GITHUB_OUTPUT
          echo "test_dir=$TEST_DIR" >> $GITHUB_OUTPUT
          echo "test_suffix=$TEST_SUFFIX" >> $GITHUB_OUTPUT
          
          # Check for existing test patterns
          if [ -d "tests" ] || [ -d "__tests__" ] || [ -d "test" ]; then
            EXISTING_TESTS=$(find . -name "*test*" -o -name "*spec*" | head -5)
            echo "existing_tests<<EOF" >> $GITHUB_OUTPUT
            echo "$EXISTING_TESTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Read source files content
        id: sources
        run: |
          SOURCE_FILES="${{ steps.pr_context.outputs.source_files }}${{ steps.issue_context.outputs.source_files }}"
          
          mkdir -p /tmp/sources
          
          # Read each source file
          for FILE in $SOURCE_FILES; do
            if [ -f "$FILE" ]; then
              echo "=== FILE: $FILE ===" >> /tmp/sources/all_sources.txt
              head -200 "$FILE" >> /tmp/sources/all_sources.txt
              echo "" >> /tmp/sources/all_sources.txt
            fi
          done
          
          if [ ! -f /tmp/sources/all_sources.txt ]; then
            echo "No source files found" > /tmp/sources/all_sources.txt
          fi

      - name: Post acknowledgment comment
        id: ack
        run: |
          if [ "${{ inputs.trigger_type }}" == "pull_request" ]; then
            TARGET_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments"
          else
            TARGET_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.issue_number }}/comments"
          fi
          
          COMMENT_BODY="🧪 **Test Generator Agent** is analyzing your code...

          **Detected Configuration:**
          - Language: \`${{ steps.detect.outputs.language }}\`
          - Test Framework: \`${{ steps.detect.outputs.framework }}\`
          - Test Directory: \`${{ steps.detect.outputs.test_dir }}\`

          I'll generate tests for the following files:
          \`\`\`
          ${{ steps.pr_context.outputs.source_files }}${{ steps.issue_context.outputs.source_files }}
          \`\`\`

          ⏳ This may take a few minutes..."
          
          RESPONSE=$(curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$TARGET_URL" \
            -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')")
          
          echo "comment_id=$(echo "$RESPONSE" | jq -r '.id')" >> $GITHUB_OUTPUT

      - name: Setup test generator agent
        run: |
          cat > /tmp/test-generator-agent.js << 'AGENT_EOF'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          // Configuration from environment
          const LANGUAGE = process.env.LANGUAGE || 'javascript';
          const FRAMEWORK = process.env.FRAMEWORK || 'jest';
          const TEST_DIR = process.env.TEST_DIR || '__tests__';
          const TEST_SUFFIX = process.env.TEST_SUFFIX || '.test.js';
          const SOURCE_FILES = (process.env.SOURCE_FILES || '').split('\n').filter(f => f.trim());

          // Read source content
          const sourcesContent = fs.existsSync('/tmp/sources/all_sources.txt') 
            ? fs.readFileSync('/tmp/sources/all_sources.txt', 'utf8')
            : '';

          // Read diff if available
          const diffContent = fs.existsSync('/tmp/pr_diff.txt')
            ? fs.readFileSync('/tmp/pr_diff.txt', 'utf8').substring(0, 10000)
            : '';

          // Framework-specific templates
          const frameworkTemplates = {
            jest: {
              imports: "const { } = require('./path');",
              describe: "describe('ModuleName', () => {\n  test('should ...', () => {\n    expect().toBe();\n  });\n});",
              beforeEach: "beforeEach(() => {\n  // Setup\n});",
              mock: "jest.mock('./module');"
            },
            pytest: {
              imports: "import pytest\nfrom module import function",
              test: "def test_function_name():\n    # Arrange\n    # Act\n    # Assert\n    assert result == expected",
              fixture: "@pytest.fixture\ndef sample_data():\n    return {}",
              parametrize: "@pytest.mark.parametrize('input,expected', [()])"
            },
            vitest: {
              imports: "import { describe, it, expect } from 'vitest'",
              describe: "describe('ModuleName', () => {\n  it('should ...', () => {\n    expect().toBe();\n  });\n});",
            },
            junit: {
              imports: "import org.junit.jupiter.api.*;\nimport static org.junit.jupiter.api.Assertions.*;",
              test: "@Test\nvoid testMethodName() {\n    // Arrange\n    // Act\n    // Assert\n    assertEquals(expected, actual);\n}",
              beforeEach: "@BeforeEach\nvoid setUp() {\n    // Setup\n}"
            },
            go: {
              imports: 'import "testing"',
              test: "func TestFunctionName(t *testing.T) {\n    // Arrange\n    // Act\n    // Assert\n    if got != want {\n        t.Errorf(\"got %v, want %v\", got, want)\n    }\n}",
              table: "tests := []struct{\n    name string\n    input interface{}\n    want interface{}\n}{}"
            },
            xunit: {
              imports: "using Xunit;",
              test: "[Fact]\npublic void TestMethodName()\n{\n    // Arrange\n    // Act\n    // Assert\n    Assert.Equal(expected, actual);\n}",
              theory: "[Theory]\n[InlineData()]\npublic void TestWithData()"
            }
          };

          const template = frameworkTemplates[FRAMEWORK] || frameworkTemplates.jest;

          // Build the prompt
          const prompt = `You are an expert test engineer. Generate comprehensive unit tests for the provided source code.

          ## Project Configuration
          - **Language**: ${LANGUAGE}
          - **Test Framework**: ${FRAMEWORK}
          - **Test Directory**: ${TEST_DIR}
          - **Test File Suffix**: ${TEST_SUFFIX}

          ## Framework Patterns to Use
          \`\`\`
          ${JSON.stringify(template, null, 2)}
          \`\`\`

          ## Source Files to Test
          ${sourcesContent.substring(0, 20000)}

          ${diffContent ? `## Recent Changes (Diff)\n\`\`\`diff\n${diffContent}\n\`\`\`` : ''}

          ## Instructions

          Generate complete, runnable test files for each source file. Follow these guidelines:

          1. **Test Coverage**:
             - Test all public functions/methods
             - Include happy path tests
             - Include edge cases (null, empty, boundary values)
             - Include error handling tests
             - Test async operations if applicable

          2. **Test Structure**:
             - Group related tests using describe/context blocks
             - Use descriptive test names that explain the behavior
             - Follow Arrange-Act-Assert pattern
             - Include setup/teardown when needed

          3. **Mocking**:
             - Mock external dependencies (APIs, databases, file system)
             - Mock complex objects with realistic test data
             - Verify mock interactions when relevant

          4. **Best Practices**:
             - Tests should be independent and idempotent
             - Avoid testing implementation details
             - Use meaningful assertions
             - Keep tests focused and readable

          ## Output Format

          For each source file, output the complete test file in this format:

          ### TEST FILE: {test_file_path}
          \`\`\`${LANGUAGE}
          // Complete test code here
          \`\`\`

          Generate tests now:`;

          // Run Copilot
          function runCopilot(prompt) {
            const promptFile = '/tmp/test_prompt.txt';
            fs.writeFileSync(promptFile, prompt);
            
            try {
              const result = execSync(`copilot -p "$(cat ${promptFile})" --no-interactive 2>&1`, {
                encoding: 'utf8',
                maxBuffer: 20 * 1024 * 1024,
                timeout: 600000,  // 10 minutes
                cwd: process.cwd()
              });
              return result;
            } catch (error) {
              console.error('Copilot error:', error.message);
              return error.stdout || '';
            }
          }

          // Parse the response to extract test files
          function parseTestFiles(response) {
            const testFiles = [];
            const regex = /### TEST FILE:\s*([^\n]+)\n```[\w]*\n([\s\S]*?)```/g;
            
            let match;
            while ((match = regex.exec(response)) !== null) {
              const filePath = match[1].trim();
              const content = match[2].trim();
              if (filePath && content) {
                testFiles.push({ path: filePath, content });
              }
            }
            
            // Fallback: try to find any code blocks if structured format not found
            if (testFiles.length === 0) {
              const codeBlockRegex = /```[\w]*\n([\s\S]*?)```/g;
              let index = 0;
              while ((match = codeBlockRegex.exec(response)) !== null) {
                const content = match[1].trim();
                if (content.includes('test') || content.includes('describe') || content.includes('def test_') || content.includes('@Test')) {
                  testFiles.push({
                    path: `${TEST_DIR}/generated_test_${index}${TEST_SUFFIX}`,
                    content
                  });
                  index++;
                }
              }
            }
            
            return testFiles;
          }

          // Main execution
          async function main() {
            console.log('=== Test Generator Agent ===');
            console.log(`Language: ${LANGUAGE}`);
            console.log(`Framework: ${FRAMEWORK}`);
            console.log(`Files to test: ${SOURCE_FILES.length}`);
            
            console.log('\n=== Running Copilot ===');
            const response = runCopilot(prompt);
            
            console.log('\n=== Parsing Response ===');
            const testFiles = parseTestFiles(response);
            
            console.log(`Found ${testFiles.length} test files to create`);
            
            // Save results
            const results = {
              success: testFiles.length > 0,
              files: testFiles,
              raw_response: response.substring(0, 50000)
            };
            
            fs.writeFileSync('/tmp/test_results.json', JSON.stringify(results, null, 2));
            fs.writeFileSync('/tmp/copilot_response.txt', response);
            
            // Create test files
            for (const file of testFiles) {
              const fullPath = path.join(process.cwd(), file.path);
              const dir = path.dirname(fullPath);
              
              if (!fs.existsSync(dir)) {
                fs.mkdirSync(dir, { recursive: true });
              }
              
              fs.writeFileSync(fullPath, file.content);
              console.log(`Created: ${file.path}`);
            }
          }

          main().catch(error => {
            console.error('Fatal error:', error);
            fs.writeFileSync('/tmp/test_results.json', JSON.stringify({
              success: false,
              error: error.message,
              files: []
            }));
            process.exit(1);
          });
          AGENT_EOF

      - name: Run test generator agent
        env:
          LANGUAGE: ${{ steps.detect.outputs.language }}
          FRAMEWORK: ${{ steps.detect.outputs.framework }}
          TEST_DIR: ${{ steps.detect.outputs.test_dir }}
          TEST_SUFFIX: ${{ steps.detect.outputs.test_suffix }}
          SOURCE_FILES: ${{ steps.pr_context.outputs.source_files }}${{ steps.issue_context.outputs.source_files }}
        run: |
          cd $GITHUB_WORKSPACE
          node /tmp/test-generator-agent.js

      - name: Commit generated tests
        id: commit
        run: |
          RESULTS=$(cat /tmp/test_results.json)
          FILE_COUNT=$(echo "$RESULTS" | jq '.files | length')
          
          if [ "$FILE_COUNT" -gt 0 ]; then
            # Configure git
            git config user.name "copilot-agent[bot]"
            git config user.email "copilot-agent[bot]@users.noreply.github.com"
            
            # Checkout the correct branch
            if [ "${{ inputs.trigger_type }}" == "pull_request" ]; then
              BRANCH="${{ steps.pr_context.outputs.head_branch }}"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
            else
              BRANCH="copilot/tests-issue-${{ inputs.issue_number }}"
              git checkout -b "$BRANCH"
            fi
            
            # Add and commit test files
            git add -A
            
            if git diff --staged --quiet; then
              echo "No changes to commit"
              echo "committed=false" >> $GITHUB_OUTPUT
            else
              COMMIT_MSG="🧪 Add generated tests

          Generated by Copilot Test Generator Agent
          - Framework: ${{ steps.detect.outputs.framework }}
          - Files: $FILE_COUNT test file(s)

          Co-authored-by: GitHub Copilot <copilot@github.com>"
              
              git commit -m "$COMMIT_MSG"
              git push origin "$BRANCH"
              
              echo "committed=true" >> $GITHUB_OUTPUT
              echo "branch=$BRANCH" >> $GITHUB_OUTPUT
              echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            fi
          else
            echo "No test files generated"
            echo "committed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for issue-triggered tests
        if: inputs.trigger_type == 'issue' && steps.commit.outputs.committed == 'true'
        run: |
          PR_BODY="## 🧪 Generated Tests

          This PR contains tests generated by the Copilot Test Generator Agent.

          **Triggered by:** Issue #${{ inputs.issue_number }}
          **Framework:** ${{ steps.detect.outputs.framework }}
          **Files Generated:** ${{ steps.commit.outputs.file_count }}

          ### Generated Test Files
          $(cat /tmp/test_results.json | jq -r '.files[].path' | sed 's/^/- /')

          ---
          Please review the generated tests and make any necessary adjustments before merging."
          
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls" \
            -d "$(jq -n \
              --arg title "🧪 Generated tests for issue #${{ inputs.issue_number }}" \
              --arg body "$PR_BODY" \
              --arg head "${{ steps.commit.outputs.branch }}" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')"

      - name: Post completion comment
        run: |
          RESULTS=$(cat /tmp/test_results.json)
          FILE_COUNT=$(echo "$RESULTS" | jq '.files | length')
          FILE_LIST=$(echo "$RESULTS" | jq -r '.files[].path' | sed 's/^/- `/' | sed 's/$/`/')
          
          if [ "${{ inputs.trigger_type }}" == "pull_request" ]; then
            TARGET_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments"
          else
            TARGET_URL="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.issue_number }}/comments"
          fi
          
          if [ "$FILE_COUNT" -gt 0 ]; then
            if [ "${{ steps.commit.outputs.committed }}" == "true" ]; then
              COMMENT="✅ **Test Generation Complete!**

          I've generated **$FILE_COUNT test file(s)** and committed them to the branch.

          ### Generated Files
          $FILE_LIST

          ### Next Steps
          1. Review the generated tests
          2. Run the test suite to verify: \`${{ steps.detect.outputs.framework == 'pytest' && 'pytest' || steps.detect.outputs.framework == 'jest' && 'npm test' || steps.detect.outputs.framework == 'go' && 'go test ./...' || 'npm test' }}\`
          3. Adjust tests as needed for your specific requirements

          ---
          💡 **Tip:** You can ask me to regenerate tests by adding the \`generate-tests\` label again."
            else
              COMMENT="⚠️ **Test Generation Complete** (No new files)

          Tests were generated but no new files were created. This might mean:
          - Tests already exist for these files
          - The generated tests were identical to existing ones

          ### Generated Content Preview
          \`\`\`
          $(cat /tmp/copilot_response.txt | head -100)
          \`\`\`"
            fi
          else
            COMMENT="❌ **Test Generation Failed**

          I wasn't able to generate tests for the specified files. This might be because:
          - The source files couldn't be analyzed
          - The code structure isn't suitable for automated test generation
          - An error occurred during generation

          Please try:
          1. Specifying files explicitly in the issue body: \`Files: path/to/file.js\`
          2. Ensuring the source files exist and are valid
          3. Checking the workflow logs for details"
          fi
          
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$TARGET_URL" \
            -d "$(jq -n --arg body "$COMMENT" '{body: $body}')"

      - name: Remove label
        run: |
          if [ "${{ inputs.trigger_type }}" == "pull_request" ]; then
            TARGET="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/labels/generate-tests"
          else
            TARGET="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.issue_number }}/labels/generate-tests"
          fi
          
          curl -k -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$TARGET" || true
