name: Copilot Interactive Reviewer

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

# Prevent multiple runs on the same PR
concurrency:
  group: copilot-pr-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-review:
    if: github.event_name == 'pull_request' && github.event.label.name == 'copilot'
    uses: ./.github/workflows/copilot-reviewer-interactive-master.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      interaction_type: 'initial_review'
      comment_id: ''
      comment_body: ''
    secrets: inherit

  comment-review:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.comment.user.login != 'copilot-agent' &&
      github.event.comment.user.login != 'github-actions[bot]'
    uses: ./.github/workflows/copilot-reviewer-interactive-master.yml
    with:
      pr_number: ${{ github.event.issue.number }}
      interaction_type: 'comment_reply'
      comment_id: ${{ github.event.comment.id }}
      comment_body: ${{ github.event.comment.body }}
    secrets: inherit