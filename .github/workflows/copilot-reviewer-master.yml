name:  Copilot PR Reviewer (Master)

# Reusable workflow for PR code review using GitHub Copilot CLI
# Pre-requisites: Node.js and Copilot CLI pre-installed on runner

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: 'Classic PAT with repo and workflow scopes'
        required: true
      COPILOT_TOKEN:
        description: 'Token for GitHub Copilot API access'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  ANALYSIS_DIR: ${{ github.workspace }}/pr-analysis
  DIFF_FILE: ${{ github.workspace }}/pr-diff.json

jobs:
  review:
    runs-on: self-hosted
    name:  Analyze PR and Generate Review
    if: github.event.label.name == 'copilot'

    steps:
      - name:  Start Review
        run: |
          echo " Copilot PR Reviewer started!"
          echo ""
          echo " PR #${{ github.event.pull_request.number }}"
          echo " Branch: ${{ github.event.pull_request.head.ref }}  ${{ github.event.pull_request.base.ref }}"
          echo " Author: ${{ github.event.pull_request.user.login }}"
          echo ""
          echo " Verifying pre-installed tools..."
          node --version
          copilot --version

      - name:  Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name:  Get PR Differences
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo " Fetching PR changes..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          FILES_URL="$API_BASE/repos/$OWNER/$REPO/pulls/$PR_NUMBER/files"
          
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$FILES_URL?per_page=100" | jq -r '.[].filename' > /tmp/pr_files.txt
          
          FILE_COUNT=$(wc -l < /tmp/pr_files.txt | tr -d ' ')
          echo " Found $FILE_COUNT changed files"
          cat /tmp/pr_files.txt

      - name:  Download Modified Files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo " Downloading modified files..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          OUTPUT_DIR="${{ env.ANALYSIS_DIR }}/source"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          mkdir -p "$OUTPUT_DIR"
          
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          
          while IFS= read -r filepath; do
              if [ -n "$filepath" ]; then
                  mkdir -p "$OUTPUT_DIR/$(dirname "$filepath")"
                  curl -s -H "Authorization: Bearer $GH_TOKEN" \
                      -H "Accept: application/vnd.github.v3.raw" \
                      "$API_BASE/repos/$OWNER/$REPO/contents/$filepath?ref=$HEAD_SHA" \
                      > "$OUTPUT_DIR/$filepath" 2>/dev/null
                  echo "   $filepath"
              fi
          done < /tmp/pr_files.txt
          
          rm -f /tmp/pr_files.txt
          echo " Download complete"

      - name:  Analyze with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo " Running Copilot analysis..."
          
          PR_DIRECTORY="${{ env.ANALYSIS_DIR }}/source"
          OUTPUT_DIR="${{ env.ANALYSIS_DIR }}/source/pr-comments"
          
          mkdir -p "$OUTPUT_DIR"
          cd "$PR_DIRECTORY"
          
          FILES=$(find . -type f ! -path "*/pr-comments/*" ! -name ".*" | sed 's|^\./||' | head -20)
          
          if [ -z "$FILES" ]; then
              echo " No files to analyze"
              exit 0
          fi
          
          echo " Files to analyze:"
          echo "$FILES"
          
          PROMPT="Analyze the code files in this PR directory and create a markdown analysis file for each.
          
          For each file, save analysis to: $OUTPUT_DIR/{filename}_analysis.md
          
          Format:
          #  {filename} Analysis
          ## Overview
          ##  Issues & Recommendations  
          ##  Summary (Good/Needs Attention/Critical)"

          copilot -p "$PROMPT" --allow-all-tools 2>&1 || true
          
          ANALYSIS_COUNT=$(find "$OUTPUT_DIR" -name "*_analysis.md" 2>/dev/null | wc -l)
          echo " Generated $ANALYSIS_COUNT analysis files"

      - name:  Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        if: always()
        run: |
          echo " Posting review comments..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMENTS_DIR="${{ env.ANALYSIS_DIR }}/source/pr-comments"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          if [ ! -d "$COMMENTS_DIR" ]; then
              echo " No comments to post"
              exit 0
          fi

          for file in "$COMMENTS_DIR"/*_analysis.md; do
              [ -f "$file" ] || continue
              echo " Posting: $(basename $file)"
              
              CONTENT=$(cat "$file" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
              
              curl -s -X POST \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  -d "{\"body\": \"$CONTENT\", \"event\": \"COMMENT\"}" \
                  "$API_BASE/repos/$OWNER/$REPO/pulls/$PR_NUMBER/reviews" > /dev/null
              
              echo "   Posted"
              sleep 1
          done
          
          echo " All comments posted"

      - name:  Summary
        if: always()
        run: |
          echo "##  PR Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "${{ env.ANALYSIS_DIR }}/source/pr-comments" ]; then
            COUNT=$(find "${{ env.ANALYSIS_DIR }}/source/pr-comments" -name "*_analysis.md" 2>/dev/null | wc -l)
            echo "- **Analysis files:** $COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:**  No issues found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo " *Generated by Copilot PR Reviewer*" >> $GITHUB_STEP_SUMMARY
