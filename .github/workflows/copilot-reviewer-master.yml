name:  Copilot PR Reviewer (Master)

# Reusable workflow for PR code review using GitHub Copilot CLI
# Pre-requisites: Node.js and Copilot CLI pre-installed on runner

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: 'Classic PAT with repo and workflow scopes'
        required: true
      COPILOT_TOKEN:
        description: 'Token for GitHub Copilot API access'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  ANALYSIS_DIR: ${{ github.workspace }}/pr-analysis

jobs:
  review:
    runs-on: self-hosted
    name:  Analyze PR and Generate Review
    if: github.event.label.name == 'copilot'

    steps:
      - name:  Start Review
        run: |
          echo " Copilot PR Reviewer started!"
          echo " PR #${{ github.event.pull_request.number }}"
          echo " Branch: ${{ github.event.pull_request.head.ref }}  ${{ github.event.pull_request.base.ref }}"
          echo " Author: ${{ github.event.pull_request.user.login }}"
          echo ""
          echo " Verifying pre-installed tools..."
          node --version
          copilot --version

      - name:  Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name:  Get Changed Files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo " Fetching PR changes..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$API_BASE/repos/$OWNER/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
              | jq -r '.[].filename' > /tmp/pr_files.txt
          
          echo " Found $(wc -l < /tmp/pr_files.txt | tr -d ' ') changed files:"
          cat /tmp/pr_files.txt

      - name:  Download Modified Files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo " Downloading modified files..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          OUTPUT_DIR="${{ env.ANALYSIS_DIR }}/source"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          mkdir -p "$OUTPUT_DIR"
          
          while IFS= read -r filepath; do
              if [ -n "$filepath" ]; then
                  mkdir -p "$OUTPUT_DIR/$(dirname "$filepath")"
                  curl -s -H "Authorization: Bearer $GH_TOKEN" \
                      -H "Accept: application/vnd.github.v3.raw" \
                      "$API_BASE/repos/$OWNER/$REPO/contents/$filepath?ref=$HEAD_SHA" \
                      > "$OUTPUT_DIR/$filepath" 2>/dev/null
                  echo "   $filepath"
              fi
          done < /tmp/pr_files.txt
          
          rm -f /tmp/pr_files.txt
          echo " Download complete"

      - name:  Analyze with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo " Running Copilot analysis..."
          
          PR_DIRECTORY="${{ env.ANALYSIS_DIR }}/source"
          OUTPUT_DIR="${{ env.ANALYSIS_DIR }}/source/pr-comments"
          
          mkdir -p "$OUTPUT_DIR"
          cd "$PR_DIRECTORY"
          
          # Get list of files
          FILES=$(find . -type f ! -path "*/pr-comments/*" ! -name ".*" | sed 's|^\./||' | head -20)
          
          if [ -z "$FILES" ]; then
              echo " No files to analyze"
              exit 0
          fi
          
          echo " Files to analyze:"
          echo "$FILES"
          
          # Build files list for prompt
          FILES_LIST=""
          for f in $FILES; do
              FILES_LIST="${FILES_LIST}- \`$f\`
          "
          done

          # Create detailed analysis prompt
          ANALYSIS_PROMPT="Analyze ALL the files in this Pull Request directory and generate a SEPARATE markdown file for EACH file analyzed.

           **Files to analyze:**
          $FILES_LIST

           **IMPORTANT INSTRUCTIONS:**

          For EACH file listed above, you must:
          1. Analyze the file thoroughly
          2. Create a separate markdown file with the analysis if there is anything noteworthy (issues, recommendations)
          3. Name each file following this pattern: replace / with _ in the original path and add _analysis.md suffix
          4. Save each file in the directory: $OUTPUT_DIR/

           **Format for EACH analysis file:**

          #  filename analysis

          ##  Overview
          Brief description of what this file does.

          ##  Issues and Recommendations
          List issues with type, description, code snippet, and recommendation.

          ##  Summary
          - **Overall Status:**  Needs Attention /  Critical Issues /  Good
          - **Priority:** High/Medium/Low
          - **Action Required:** Yes/No

          Focus only on this single file. Be thorough but concise."

          # Execute copilot
          copilot -p "$ANALYSIS_PROMPT" --allow-all-tools 2>&1 || true
          
          ANALYSIS_COUNT=$(find "$OUTPUT_DIR" -name "*_analysis.md" 2>/dev/null | wc -l)
          echo " Generated $ANALYSIS_COUNT analysis files"

      - name:  Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        if: always()
        run: |
          echo " Posting review comments..."
          
          GHES_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMENTS_DIR="${{ env.ANALYSIS_DIR }}/source/pr-comments"
          
          if [[ "$GHES_HOST" == "github.com" ]]; then
              API_BASE="https://api.github.com"
          else
              API_BASE="https://$GHES_HOST/api/v3"
          fi

          if [ ! -d "$COMMENTS_DIR" ]; then
              echo " No comments directory found"
              exit 0
          fi

          shopt -s nullglob
          for file in "$COMMENTS_DIR"/*_analysis.md; do
              echo " Posting: $(basename "$file")"
              
              CONTENT=$(cat "$file" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
              
              curl -s -X POST \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  -d "{\"body\": \"$CONTENT\", \"event\": \"COMMENT\"}" \
                  "$API_BASE/repos/$OWNER/$REPO/pulls/$PR_NUMBER/reviews" > /dev/null
              
              echo "   Posted"
              sleep 1
          done
          
          echo " All comments posted"

      - name:  Summary
        if: always()
        run: |
          echo "##  PR Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          COMMENTS_DIR="${{ env.ANALYSIS_DIR }}/source/pr-comments"
          if [ -d "$COMMENTS_DIR" ]; then
            COUNT=$(find "$COMMENTS_DIR" -name "*_analysis.md" 2>/dev/null | wc -l)
            echo "- **Analysis files:** $COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:**  No issues found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo " *Generated by Copilot PR Reviewer*" >> $GITHUB_STEP_SUMMARY