name: Copilot Interactive Reviewer (Master)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      interaction_type:
        required: true
        type: string
        description: 'initial_review, comment_reply, or review_comment_reply'
      comment_id:
        required: false
        type: string
        default: ''
      comment_body:
        required: false
        type: string
        default: ''

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
  NODE_TLS_REJECT_UNAUTHORIZED: '0'

jobs:
  interactive-review:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR details
        id: pr
        run: |
          PR_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          echo "title=$(echo "$PR_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "head_sha=$(echo "$PR_DATA" | jq -r '.head.sha')" >> $GITHUB_OUTPUT
          echo "base_branch=$(echo "$PR_DATA" | jq -r '.base.ref')" >> $GITHUB_OUTPUT
          echo "head_branch=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "author=$(echo "$PR_DATA" | jq -r '.user.login')" >> $GITHUB_OUTPUT
          
          echo "body<<EOFBODY" >> $GITHUB_OUTPUT
          echo "$PR_DATA" | jq -r '.body // empty' >> $GITHUB_OUTPUT
          echo "EOFBODY" >> $GITHUB_OUTPUT

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          echo "$DIFF" > /tmp/pr_diff.txt
          
          FILES=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/files" | \
            jq -r '.[].filename' | head -50)
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load or create session context
        id: session
        run: |
          SESSION_FILE=".copilot-sessions/pr-${{ inputs.pr_number }}.json"
          
          SESSION_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" 2>/dev/null || echo "{}")
          
          if echo "$SESSION_DATA" | jq -e '.content' > /dev/null 2>&1; then
            echo "Found existing session"
            echo "$SESSION_DATA" | jq -r '.content' | base64 -d > /tmp/session.json
            echo "session_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Creating new session"
            echo '{"interactions":[],"context":{}}' > /tmp/session.json
            echo "session_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch conversation history
        run: |
          COMMENTS=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments" | \
            jq '[.[] | {author: .user.login, body: .body, created_at: .created_at}]')
          
          REVIEW_COMMENTS=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/comments" | \
            jq '[.[] | {author: .user.login, body: .body, path: .path, line: .line, created_at: .created_at}]')
          
          echo "$COMMENTS" > /tmp/pr_comments.json
          echo "$REVIEW_COMMENTS" > /tmp/review_comments.json

      - name: Acknowledge interaction
        if: inputs.interaction_type != 'initial_review'
        run: |
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/comments/${{ inputs.comment_id }}/reactions" \
            -d '{"content":"eyes"}'

      - name: Build prompt and run Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          INTERACTION_TYPE: ${{ inputs.interaction_type }}
          COMMENT_BODY: ${{ inputs.comment_body }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
        run: |
          cd $GITHUB_WORKSPACE
          
          # Read context files
          DIFF=$(cat /tmp/pr_diff.txt | head -c 15000)
          SESSION=$(cat /tmp/session.json)
          COMMENTS=$(cat /tmp/pr_comments.json)
          
          # Build conversation context from previous interactions
          PREV_CONTEXT=""
          if echo "$SESSION" | jq -e '.interactions | length > 0' > /dev/null 2>&1; then
            PREV_CONTEXT=$(echo "$SESSION" | jq -r '.interactions[-5:] | .[] | "User: \(.user_message)\nCopilot: \(.copilot_response[0:300])...\n"')
          fi
          
          # Build recent comments context
          RECENT_COMMENTS=""
          if [ "$(echo "$COMMENTS" | jq 'length')" -gt "0" ]; then
            RECENT_COMMENTS=$(echo "$COMMENTS" | jq -r '.[-10:] | .[] | "- @\(.author): \(.body[0:150])"')
          fi
          
          echo "============================================================"
          echo "Copilot Interactive Reviewer"
          echo "============================================================"
          echo "PR: #$PR_NUMBER"
          echo "Type: $INTERACTION_TYPE"
          echo "============================================================"
          
          # Build prompt based on interaction type
          if [ "$INTERACTION_TYPE" == "initial_review" ]; then
            PROMPT="You are an expert code reviewer for PR #${PR_NUMBER}.

          PR Information:
          - Title: ${PR_TITLE}
          - Author: @${PR_AUTHOR}
          - Branch: ${HEAD_BRANCH} to ${BASE_BRANCH}
          - Description: ${PR_BODY}

          Changed Files:
          ${CHANGED_FILES}

          Code Diff:
          ${DIFF}

          Please provide a thorough code review including:
          1. Summary of changes
          2. Strengths of the implementation
          3. Suggestions for improvement with specific file and line references
          4. Questions for the author
          5. Any security or performance concerns

          End your review by mentioning that the author can ask follow-up questions by mentioning @copilot in comments."
          else
            # Extract question (remove @copilot mentions) - use sed for trim instead of xargs to handle quotes
            USER_QUESTION=$(echo "$COMMENT_BODY" | sed 's/@copilot[-a-zA-Z0-9]*//gi' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            
            PROMPT="You are continuing a code review conversation for PR #${PR_NUMBER}.

          PR Context:
          - Title: ${PR_TITLE}
          - Author: @${PR_AUTHOR}
          - Branch: ${HEAD_BRANCH} to ${BASE_BRANCH}

          Changed Files:
          ${CHANGED_FILES}

          Code Diff (for reference):
          ${DIFF}

          Previous interactions:
          ${PREV_CONTEXT}

          Recent comments:
          ${RECENT_COMMENTS}

          Developer question:
          ${USER_QUESTION}

          Please respond helpfully to the developer question. Reference specific code when relevant. Remind them they can continue asking questions with @copilot."
          fi
          
          # Save prompt to file
          echo "$PROMPT" > /tmp/copilot_prompt.txt
          
          echo "Running Copilot CLI..."
          
          # Run Copilot with CLI (most reliable method)
          RESPONSE=$(copilot -p "$(cat /tmp/copilot_prompt.txt)" --add-dir "$(pwd)" --allow-all-tools 2>&1) || true
          
          # Save response
          echo "$RESPONSE" > /tmp/copilot_response.txt
          
          echo "============================================================"
          echo "Response generated"
          echo "============================================================"
          
          # Update session
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          USER_MSG="${COMMENT_BODY:-Initial review request}"
          RESP_PREVIEW=$(echo "$RESPONSE" | head -c 2000)
          
          NEW_SESSION=$(echo "$SESSION" | jq --arg type "$INTERACTION_TYPE" \
            --arg ts "$TIMESTAMP" \
            --arg user "$USER_MSG" \
            --arg resp "$RESP_PREVIEW" \
            '.interactions += [{"type": $type, "timestamp": $ts, "user_message": $user, "copilot_response": $resp, "method": "cli"}] | .interactions = .interactions[-20:]')
          
          echo "$NEW_SESSION" > /tmp/session_updated.json

      - name: Post response to PR
        run: |
          RESPONSE=$(cat /tmp/copilot_response.txt)
          RESPONSE_ESCAPED=$(echo "$RESPONSE" | jq -Rs .)
          
          if [ "${{ inputs.interaction_type }}" == "initial_review" ]; then
            curl -k -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/reviews" \
              -d "{\"body\": $RESPONSE_ESCAPED, \"event\": \"COMMENT\"}"
          else
            curl -k -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments" \
              -d "{\"body\": $RESPONSE_ESCAPED}"
          fi

      - name: Update reaction to complete
        if: inputs.interaction_type != 'initial_review'
        run: |
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/comments/${{ inputs.comment_id }}/reactions" \
            -d '{"content":"rocket"}'

      - name: Save session state
        run: |
          SESSION_FILE=".copilot-sessions/pr-${{ inputs.pr_number }}.json"
          SESSION_CONTENT=$(base64 -w 0 /tmp/session_updated.json)
          
          EXISTING=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" 2>/dev/null || echo "{}")
          
          SHA=$(echo "$EXISTING" | jq -r '.sha // empty')
          
          if [ -n "$SHA" ]; then
            curl -k -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" \
              -d "{\"message\": \"Update session PR #${{ inputs.pr_number }}\", \"content\": \"$SESSION_CONTENT\", \"sha\": \"$SHA\"}"
          else
            curl -k -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" \
              -d "{\"message\": \"Create session PR #${{ inputs.pr_number }}\", \"content\": \"$SESSION_CONTENT\"}"
          fi

      - name: Remove copilot label
        if: inputs.interaction_type == 'initial_review'
        run: |
          curl -k -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/labels/copilot" || true
