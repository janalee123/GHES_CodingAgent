name: Copilot Interactive Reviewer (Master)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      interaction_type:
        required: true
        type: string
        description: 'initial_review, comment_reply, or review_comment_reply'
      comment_id:
        required: false
        type: string
        default: ''
      comment_body:
        required: false
        type: string
        default: ''

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
  NODE_TLS_REJECT_UNAUTHORIZED: '0'

jobs:
  interactive-review:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR details
        id: pr
        run: |
          PR_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          echo "title=$(echo "$PR_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "head_sha=$(echo "$PR_DATA" | jq -r '.head.sha')" >> $GITHUB_OUTPUT
          echo "base_branch=$(echo "$PR_DATA" | jq -r '.base.ref')" >> $GITHUB_OUTPUT
          echo "head_branch=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "author=$(echo "$PR_DATA" | jq -r '.user.login')" >> $GITHUB_OUTPUT
          
          echo "body<<EOFBODY" >> $GITHUB_OUTPUT
          echo "$PR_DATA" | jq -r '.body // empty' >> $GITHUB_OUTPUT
          echo "EOFBODY" >> $GITHUB_OUTPUT

      - name: Fetch PR diff
        id: diff
        run: |
          DIFF=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}")
          
          echo "$DIFF" > /tmp/pr_diff.txt
          
          FILES=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/files" | \
            jq -r '.[].filename' | head -50)
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load or create session context
        id: session
        run: |
          SESSION_FILE=".copilot-sessions/pr-${{ inputs.pr_number }}.json"
          
          SESSION_DATA=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" 2>/dev/null || echo "{}")
          
          if echo "$SESSION_DATA" | jq -e '.content' > /dev/null 2>&1; then
            echo "Found existing session"
            echo "$SESSION_DATA" | jq -r '.content' | base64 -d > /tmp/session.json
            echo "session_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Creating new session"
            echo '{"interactions":[],"context":{}}' > /tmp/session.json
            echo "session_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch conversation history
        run: |
          COMMENTS=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments" | \
            jq '[.[] | {author: .user.login, body: .body, created_at: .created_at}]')
          
          REVIEW_COMMENTS=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/comments" | \
            jq '[.[] | {author: .user.login, body: .body, path: .path, line: .line, created_at: .created_at}]')
          
          echo "$COMMENTS" > /tmp/pr_comments.json
          echo "$REVIEW_COMMENTS" > /tmp/review_comments.json

      - name: Acknowledge interaction
        if: inputs.interaction_type != 'initial_review'
        run: |
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/comments/${{ inputs.comment_id }}/reactions" \
            -d '{"content":"eyes"}'

      - name: Setup Copilot ACP agent script
        run: |
          cat > /tmp/copilot-acp-agent.mjs << 'SCRIPT_EOF'
          /**
           * Copilot Interactive Agent v3.0 - Proper ACP Implementation
           * Uses @agentclientprotocol/sdk for correct protocol handling
           */
          import { spawn } from 'node:child_process';
          import { Readable, Writable } from 'node:stream';
          import * as fs from 'node:fs';
          import * as acp from '@agentclientprotocol/sdk';

          // Configuration from environment
          const PR_NUMBER = process.env.PR_NUMBER;
          const INTERACTION_TYPE = process.env.INTERACTION_TYPE;
          const COMMENT_BODY = process.env.COMMENT_BODY || '';
          const PR_TITLE = process.env.PR_TITLE;
          const PR_BODY = process.env.PR_BODY || '';
          const PR_AUTHOR = process.env.PR_AUTHOR;
          const CHANGED_FILES = process.env.CHANGED_FILES || '';
          const HEAD_BRANCH = process.env.HEAD_BRANCH;
          const BASE_BRANCH = process.env.BASE_BRANCH;

          // Load context files
          const diff = fs.readFileSync('/tmp/pr_diff.txt', 'utf8');
          const prComments = JSON.parse(fs.readFileSync('/tmp/pr_comments.json', 'utf8'));
          const session = JSON.parse(fs.readFileSync('/tmp/session.json', 'utf8'));

          // Build conversation context
          function buildConversationContext() {
            let context = '';
            if (session.interactions && session.interactions.length > 0) {
              context += '\n## Previous Interactions:\n';
              session.interactions.slice(-5).forEach((interaction, i) => {
                context += `\n### ${i + 1}. ${interaction.type}:\n`;
                context += `User: ${interaction.user_message}\n`;
                context += `Copilot: ${interaction.copilot_response.substring(0, 500)}...\n`;
              });
            }
            if (prComments.length > 0) {
              context += '\n## Recent Comments:\n';
              prComments.slice(-10).forEach(c => {
                context += `- @${c.author}: ${c.body.substring(0, 200)}\n`;
              });
            }
            return context;
          }

          // Build prompt
          function buildPrompt() {
            const ctx = buildConversationContext();
            
            if (INTERACTION_TYPE === 'initial_review') {
              return `You are an expert code reviewer for PR #${PR_NUMBER}.

## PR Info
- Title: ${PR_TITLE}
- Author: @${PR_AUTHOR}
- Branch: ${HEAD_BRANCH} -> ${BASE_BRANCH}
- Description: ${PR_BODY}

## Changed Files
${CHANGED_FILES}

## Diff
\`\`\`diff
${diff.substring(0, 15000)}
\`\`\`

Please provide a thorough code review:
1. Summary of changes
2. Strengths
3. Suggestions with file/line references
4. Questions for the author
5. Security/Performance concerns

End by mentioning @copilot for follow-up questions.`;
            } else {
              const question = COMMENT_BODY.replace(/@copilot[-\w]*/gi, '').trim();
              return `You are continuing a code review conversation for PR #${PR_NUMBER}.

## PR Context
- Title: ${PR_TITLE}
- Author: @${PR_AUTHOR}
- Branch: ${HEAD_BRANCH} -> ${BASE_BRANCH}

## Files Changed
${CHANGED_FILES}

## Diff
\`\`\`diff
${diff.substring(0, 10000)}
\`\`\`

${ctx}

## Developer Question
"${question}"

Respond helpfully. Reference code when relevant. Remind them to use @copilot for more questions.`;
            }
          }

          // Run with ACP protocol
          async function runWithACP(promptText) {
            console.log('[ACP] Starting Copilot with ACP protocol...');
            
            const copilotProcess = spawn('copilot', ['--acp', '--stdio'], {
              stdio: ['pipe', 'pipe', 'inherit'],
              env: process.env
            });

            if (!copilotProcess.stdin || !copilotProcess.stdout) {
              throw new Error('Failed to start Copilot ACP process');
            }

            const output = Writable.toWeb(copilotProcess.stdin);
            const input = Readable.toWeb(copilotProcess.stdout);
            const stream = acp.ndJsonStream(output, input);

            let fullResponse = '';

            const client = {
              async requestPermission(params) {
                // Allow read-only operations, deny writes
                const tool = params.permissions?.[0]?.tool || '';
                const readOnly = ['read', 'grep', 'glob', 'list', 'search'].some(t => tool.toLowerCase().includes(t));
                console.log(`[ACP] Permission ${tool}: ${readOnly ? 'granted' : 'denied'}`);
                return { outcome: { outcome: readOnly ? 'granted' : 'cancelled' } };
              },
              async sessionUpdate(params) {
                const update = params.update;
                if (update.sessionUpdate === 'agent_message_chunk' && update.content?.type === 'text') {
                  process.stdout.write(update.content.text);
                  fullResponse += update.content.text;
                }
              }
            };

            const connection = new acp.ClientSideConnection((_agent) => client, stream);

            console.log('[ACP] Initializing connection...');
            await connection.initialize({
              protocolVersion: acp.PROTOCOL_VERSION,
              clientCapabilities: {}
            });

            console.log('[ACP] Creating session...');
            const sessionResult = await connection.newSession({
              cwd: process.cwd(),
              mcpServers: []
            });

            console.log('[ACP] Session started, sending prompt...');
            const promptResult = await connection.prompt({
              sessionId: sessionResult.sessionId,
              prompt: [{ type: 'text', text: promptText }]
            });

            console.log(`\n[ACP] Prompt finished: ${promptResult.stopReason}`);

            // Cleanup
            copilotProcess.stdin.end();
            copilotProcess.kill('SIGTERM');
            await new Promise(resolve => {
              copilotProcess.once('exit', resolve);
              setTimeout(resolve, 2000);
            });

            return fullResponse;
          }

          // Fallback to CLI
          async function runWithCLI(promptText) {
            console.log('[CLI] Using Copilot CLI fallback...');
            const { execSync } = await import('node:child_process');
            
            fs.writeFileSync('/tmp/copilot_prompt.txt', promptText);
            
            try {
              const result = execSync(
                'copilot -p "$(cat /tmp/copilot_prompt.txt)" --add-dir "$(pwd)" --allow-all-tools 2>&1',
                { encoding: 'utf8', maxBuffer: 10 * 1024 * 1024, timeout: 300000, cwd: process.cwd() }
              );
              return result;
            } catch (error) {
              console.error('[CLI] Error:', error.message);
              return error.stdout || 'Unable to generate response.';
            }
          }

          // Main
          async function main() {
            const prompt = buildPrompt();
            
            console.log('='.repeat(60));
            console.log('Copilot Interactive Agent v3.0 (ACP)');
            console.log('='.repeat(60));
            console.log(`PR: #${PR_NUMBER}`);
            console.log(`Interaction: ${INTERACTION_TYPE}`);
            console.log('='.repeat(60));
            console.log('Prompt preview:');
            console.log(prompt.substring(0, 600) + '...');
            console.log('='.repeat(60));

            let response;
            let method = 'cli';

            // Try ACP first, fall back to CLI
            try {
              response = await runWithACP(prompt);
              method = 'acp';
            } catch (acpError) {
              console.log('[WARN] ACP failed:', acpError.message);
              console.log('[INFO] Falling back to CLI...');
              response = await runWithCLI(prompt);
              method = 'cli';
            }

            response = response.trim();
            if (!response) {
              response = 'Unable to generate response. Please try again.';
            }

            // Update session
            session.interactions = session.interactions || [];
            session.interactions.push({
              type: INTERACTION_TYPE,
              timestamp: new Date().toISOString(),
              user_message: COMMENT_BODY || 'Initial review',
              copilot_response: response.substring(0, 2000),
              method: method
            });
            if (session.interactions.length > 20) {
              session.interactions = session.interactions.slice(-20);
            }

            fs.writeFileSync('/tmp/copilot_response.txt', response);
            fs.writeFileSync('/tmp/session_updated.json', JSON.stringify(session, null, 2));

            console.log('\n' + '='.repeat(60));
            console.log(`[OK] Response generated via ${method.toUpperCase()}`);
            console.log('='.repeat(60));
          }

          main().catch(error => {
            console.error('[ERROR]', error);
            fs.writeFileSync('/tmp/copilot_response.txt',
              'An error occurred: ' + error.message + '\n\nPlease try @copilot again.');
            process.exit(1);
          });
          SCRIPT_EOF

      - name: Run Copilot ACP agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          INTERACTION_TYPE: ${{ inputs.interaction_type }}
          COMMENT_BODY: ${{ inputs.comment_body }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
        run: |
          cd $GITHUB_WORKSPACE
          node --experimental-vm-modules /tmp/copilot-acp-agent.mjs

      - name: Post response to PR
        run: |
          RESPONSE=$(cat /tmp/copilot_response.txt)
          RESPONSE_ESCAPED=$(echo "$RESPONSE" | jq -Rs .)
          
          if [ "${{ inputs.interaction_type }}" == "initial_review" ]; then
            curl -k -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}/reviews" \
              -d "{\"body\": $RESPONSE_ESCAPED, \"event\": \"COMMENT\"}"
          else
            curl -k -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/comments" \
              -d "{\"body\": $RESPONSE_ESCAPED}"
          fi

      - name: Update reaction to complete
        if: inputs.interaction_type != 'initial_review'
        run: |
          curl -k -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/comments/${{ inputs.comment_id }}/reactions" \
            -d '{"content":"rocket"}'

      - name: Save session state
        run: |
          SESSION_FILE=".copilot-sessions/pr-${{ inputs.pr_number }}.json"
          SESSION_CONTENT=$(base64 -w 0 /tmp/session_updated.json)
          
          EXISTING=$(curl -k -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" 2>/dev/null || echo "{}")
          
          SHA=$(echo "$EXISTING" | jq -r '.sha // empty')
          
          if [ -n "$SHA" ]; then
            curl -k -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" \
              -d "{\"message\": \"Update session PR #${{ inputs.pr_number }}\", \"content\": \"$SESSION_CONTENT\", \"sha\": \"$SHA\"}"
          else
            curl -k -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/$SESSION_FILE" \
              -d "{\"message\": \"Create session PR #${{ inputs.pr_number }}\", \"content\": \"$SESSION_CONTENT\"}"
          fi

      - name: Remove copilot label
        if: inputs.interaction_type == 'initial_review'
        run: |
          curl -k -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ inputs.pr_number }}/labels/copilot" || true
